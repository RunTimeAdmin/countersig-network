services:
  oracle:
    build:
      context: ./oracle
      dockerfile: Dockerfile
    container_name: countersig-oracle
    restart: unless-stopped
    env_file: ./oracle/.env
    ports:
      - "127.0.0.1:3030:3030"
    volumes:
      # attestation/flag state survives restarts and rebuilds (see oracle/store.js)
      - oracle_state:/data
    networks:
      - default
      - countersig-mesh

networks:
  # shared with CounterAudit so it can reach the oracle without exposing a host port
  countersig-mesh:
    external: true

volumes:
  oracle_state:
